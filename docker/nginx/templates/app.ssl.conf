# HTTPS — enable after Let's Encrypt certificates are issued.

upstream multivate_web {
    server frontend:3000;
}

server {
    listen 80;
    server_name www.multivateskill.com multivateskill.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.multivateskill.com multivateskill.com;

    ssl_certificate /etc/letsencrypt/live/www.multivateskill.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.multivateskill.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://multivate_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
