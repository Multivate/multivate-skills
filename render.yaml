# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Apply from the Render dashboard (Blueprint / New Blueprint) using this repo.
# Tuned for this monorepo: API builds from `backend/` and gets DATABASE_URL from the Postgres instance.

databases:
  - name: multivate-db
    region: oregon
    plan: free

services:
  - type: web
    name: multivate-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python — new Render services default to 3.14.x, which can break native wheels / tooling.
      - key: PYTHON_VERSION
        value: 3.12.8
      # Safe defaults so the first deploy succeeds (tables via create_all). Switch to production + migrations later.
      - key: ENVIRONMENT
        value: development
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: multivate-db
          property: connectionString
      # Set in the dashboard to your real frontend origin(s), comma-separated (e.g. https://yourapp.onrender.com).
      - key: CORS_ORIGINS
        sync: false
