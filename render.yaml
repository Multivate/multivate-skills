# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Apply from the Render dashboard (Blueprint / New Blueprint) using this repo.
# Tuned for this monorepo: API builds from `backend/` and gets DATABASE_URL from the Postgres instance.

databases:
  - name: multivate-db
    region: oregon
    plan: free

services:
  - type: web
    name: multivate-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python — new Render services default to 3.14.x, which can break native wheels / tooling.
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: multivate-db
          property: connectionString
      # Set in the dashboard (comma-separated origins):
      # https://multivate.com.ng,https://www.multivate.com.ng,https://multivateco.vercel.app
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false
